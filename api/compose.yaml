services:
  postgres:
    image: 'postgres:16-alpine'
    environment:
      - 'POSTGRES_DB=homecooking'
      - 'POSTGRES_PASSWORD=homecooking'
      - 'POSTGRES_USER=homecooking'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U homecooking']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      - DATABASE_URL=postgres://homecooking:homecooking@postgres:5432/homecooking?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
